<div class="profile-page">

  <div class="profile-card-main">

    @if (userService.currentUser()) {

    <div class="profile-header">

      <img
        class="avatar"
        [src]="userService.currentUser()?.imageurl || 'assets/default-avatar.png'"
      />

      <div class="profile-info">
        <h1>{{ userService.currentUser()?.displayName }}</h1>
        <p>{{ userService.currentUser()?.bio }}</p>
      </div>

      <div class="update-profile">
        <button mat-button class="update-btn" [routerLink]="['/user-profile/update']" routerLinkActive="router-link-active" >
          <mat-icon>settings</mat-icon>
          Edit Profile
        </button>
      </div>
    </div>

    <div class="profile-content">

      <div class="info-card">
        <h3>Library Activity</h3>
        <p>Books read: 0</p>
        <p>Reviews: 0</p>
      </div>

    </div>

    }

  </div>

</div>
