<div class="profile-page">

  @if (userService.currentUser()) {

    <div class="profile-header">

      <img
        class="avatar"
        [src]="userService.currentUser()?.profileImageurl || 'assets/default-avatar.png'"
      />

      <h1 class="name">
        {{ userService.currentUser()?.displayName }}
      </h1>

      <p class="bio">
        {{ userService.currentUser()?.bio }}
      </p>

    </div>

    <div class="profile-content">

      <div class="info-card">
        <h3>About</h3>
        <p>{{ userService.currentUser()?.bio }}</p>
      </div>

      <div class="info-card">
        <h3>Library Activity</h3>
        <p>Books read: 0</p>
        <p>Reviews: 0</p>
      </div>

    </div>

  }

</div>
