<div class="genres-container">


  @if (genres$ | async; as genres) {

    <div class="genres-grid">

      @for (genre of genres; track genre.genreId) {

        <app-card
          [title]="genre.name"
          [description]="genre.description">
        </app-card>

      }

    </div>

  } @else {

    <div class="loading-wrapper">

      <app-card
        title="Loading genres..."
        [loading]="true">
      </app-card>

    </div>

  }

</div>
