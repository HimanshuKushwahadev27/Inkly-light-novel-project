spring.application.name=order-service


spring.datasource.url=jdbc:postgresql://localhost:5433/flix_library
spring.datasource.username=postgres
spring.datasource.password=DEfaulty
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
#create , create-drop , update , none
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.show_sql=true


#flyway
spring.flyway.baseline-on-migrate=true

#kafka config
spring.kafka.bootstrap-servers=broker:9092
spring.kafka.consumer.group-id=orderService
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.emi.events
spring.kafka.consumer.properties.spring.json.use.type.headers=false
spring.kafka.consumer.properties.schema.registry.url=http://schema-registry:8081
spring.kafka.consumer.properties.specific.avro.reader=true